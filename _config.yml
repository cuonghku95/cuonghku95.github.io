# Welcome to Quang Cuong Doan's Academic Website Configuration!

# Basic Site Settings
locale: "en-US"
site_theme: "default"
title: "Quang Cuong Doan"
title_separator: "-"
name: "Quang Cuong Doan"
description: "Quang Cuong Doan's academic portfolio - PhD Candidate at HKU"
url: "https://cuonghku95.github.io" 
baseurl: "" # Để trống nếu tên repo là cuonghku95.github.io
repository: "cuonghku95/cuonghku95.github.io"

# Site Author - Cấu hình Sidebar bên trái
author:
  avatar: "profile.png" # Đảm bảo anh đã up ảnh tên profile.png vào thư mục /images/
  name: "Quang Cuong Doan"
  pronouns: "he/his"
  bio: "PhD Candidate"
  location: "Hong Kong"
  employer: "The University of Hong Kong"
  uri: "https://scholar.google.com/citations?user=GP9_no4AAAAJ"
  email: "cuongdoan@connect.hku.hk"

  # Academic websites
  googlescholar: "https://scholar.google.com/citations?user=GP9_no4AAAAJ"
  orcid: "https://orcid.org/0000-0002-3153-6113" # Anh hãy cập nhật đúng ID Orcid của mình nếu có
  pubmed: # URL nếu anh có bài trên Pubmed
  researchgate: "https://www.researchgate.net/profile/Quang-Cuong-Doan?ev=hdr_xprf&_tp=eyJjb250ZXh0Ijp7ImZpcnN0UGFnZSI6ImhvbWUiLCJwYWdlIjoiaG9tZSIsInBvc2l0aW9uIjoiZ2xvYmFsSGVhZGVyIn19"

  # Repositories and software development
  github: "cuonghku95"

  # Social media
  linkedin: "https://www.linkedin.com/in/quang-cuong-doan-0ab7021a1/" # Thay bằng ID LinkedIn của anh
  twitter: 
  facebook: 
  youtube: 

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser: # /images/teaser-sharing.png
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: true # Bật bản đồ các nơi anh đã đi thuyết trình (cần file trong _talks)

# Analytics (Nếu anh muốn dùng Google Analytics thì điền ID vào đây)
analytics:
  provider: "false"
  google:
    tracking_id:

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - Gemfile
  - LICENSE
  - README
  - vendor

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Collections (Các mục chính của web academic)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: false
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Default Layouts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Hong_Kong # Đã chỉnh về giờ Hong Kong cho anh
